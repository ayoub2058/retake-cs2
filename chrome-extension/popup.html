<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetakeAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d5ff4c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
            <line x1="9.69" y1="8" x2="21.17" y2="8"/>
            <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
            <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
            <line x1="14.31" y1="16" x2="2.83" y2="16"/>
            <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
          </svg>
        </div>
        <div>
          <div class="brand">RetakeAI</div>
          <div class="subtitle">CS2 Auth Linker</div>
        </div>
      </div>
    </div>

    <!-- Status Section -->
    <div class="section">
      <div class="section-label">Extracted Codes</div>

      <div class="code-card" id="auth-card">
        <div class="code-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Game Auth Code
        </div>
        <div class="code-value" id="auth-value">—</div>
      </div>

      <div class="code-card" id="token-card">
        <div class="code-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          Last Match Token
        </div>
        <div class="code-value" id="token-value">—</div>
      </div>

      <div class="timestamp" id="timestamp"></div>
    </div>

    <!-- Actions -->
    <div class="section actions">
      <button class="btn btn-primary" id="btn-send-retakeai" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send Codes to RetakeAI
      </button>
      <button class="btn btn-secondary" id="btn-open-steam">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open Steam GCPD Page
      </button>
      <button class="btn btn-ghost" id="btn-clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear Stored Codes
      </button>
    </div>

    <!-- Status message -->
    <div class="section" id="status-section" style="display: none;">
      <div id="status-message" class="status-msg"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Visit the Steam page while logged in. Codes will be captured automatically.
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
