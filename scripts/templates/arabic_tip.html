<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
      color: #e4e4e7;
      padding: 32px;
      width: 800px;
      min-height: 600px;
      direction: rtl;
      line-height: 1.8;
    }
    
    .container {
      background: rgba(30, 30, 60, 0.9);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(139, 92, 246, 0.4);
    }
    
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 14px;
      color: #a1a1aa;
    }
    
    .content {
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    /* Section headers with emojis */
    .content br + br {
      display: block;
      content: "";
      margin-bottom: 12px;
    }
    
    /* Style lines starting with emoji */
    .section {
      margin: 20px 0 12px 0;
      padding: 12px 16px;
      background: rgba(139, 92, 246, 0.1);
      border-radius: 8px;
      border-right: 4px solid #8b5cf6;
      font-weight: 600;
      font-size: 18px;
      color: #c4b5fd;
    }
    
    .paragraph {
      margin-bottom: 16px;
      padding: 0 8px;
    }
    
    /* Highlight round numbers */
    .round-num {
      color: #fbbf24;
      font-weight: 600;
    }
    
    /* Highlight game terms in English */
    .game-term {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #34d399;
      font-weight: 500;
      direction: ltr;
      display: inline-block;
    }
    
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(139, 92, 246, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #71717a;
      font-size: 12px;
    }
    
    .footer img {
      height: 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎮</div>
      <div>
        <div class="title">RetakeAI - تحليل المباراة</div>
        <div class="subtitle">نصائح تكتيكية مخصصة لك</div>
      </div>
    </div>
    <div class="content" id="tip-content">
      {{TIP_CONTENT}}
    </div>
    <div class="footer">
      <span>RetakeAI Coach</span>
      <span>{{MAP_NAME}} • {{MATCH_RESULT}}</span>
    </div>
  </div>
</body>
</html>
